# Assign Reviewers — Smart team assignment based on diff weight
#
# NOTE: This workflow is upstream-only. It relies on GitHub App credentials
# (COORDINATOR_APP_ID / COORDINATOR_APP_PRIVATE_KEY) and access to
# zed-industries/codeowner-coordinator, which are not available in this fork.
#
# The job is replaced with a no-op so CI passes without the upstream credentials.

name: Assign Reviewers

on:
  pull_request_target:
    types: [opened, ready_for_review]

permissions: {}

concurrency:
  group: assign-reviewers-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  assign-reviewers:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Skipped — upstream-only workflow, no credentials available in this fork."
